<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notas5</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="escritorio">
    <h1>notas5</h1>
    <div id="carpetas"></div>
  </div>

  <div id="ventana" class="ventana hidden">
    <div class="ventana-titlebar" id="ventana-titlebar">
      <button class="ventana-cerrar-btn" id="ventana-cerrar">&times;</button>
      <span class="ventana-titulo" id="ventana-titulo">carpeta</span>
      <span class="ventana-count" id="ventana-count"></span>
    </div>
    <div class="ventana-toolbar">
      <button id="btn-vista-grid" class="vista-btn active">grid</button>
      <button id="btn-vista-lista" class="vista-btn">lista</button>
      <button id="btn-vista-lectura" class="vista-btn">leer</button>
      <input type="text" id="buscar" placeholder="buscar...">
    </div>
    <div class="ventana-contenido" id="ventana-contenido"></div>
    <div class="sneak-peek" id="sneak-peek" style="display:none">
      <span class="sneak-peek-titulo" id="sneak-peek-titulo"></span>
      <span class="sneak-peek-fecha" id="sneak-peek-fecha"></span>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
