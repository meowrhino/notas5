<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notas5</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="escritorio">
    <h1>notas5</h1>
    <div id="carpetas"></div>
  </div>

  <div id="ventana" class="ventana hidden">
    <div class="ventana-titlebar" id="ventana-titlebar">
      <button class="ventana-cerrar-btn" id="ventana-cerrar">&times;</button>
      <span class="ventana-titulo" id="ventana-titulo">carpeta</span>
      <span class="ventana-count" id="ventana-count"></span>
    </div>
    <div class="ventana-toolbar">
      <button id="btn-vista-cycle" class="vista-btn" title="cambiar vista">
        <span class="icon-grid"><span></span><span></span><span></span><span></span></span>
        <span class="icon-lista"><span></span><span></span><span></span></span>
        <span class="icon-lectura"><span></span><span></span><span></span></span>
      </button>
      <button id="btn-zoom-out" class="vista-btn" title="zoom out">&minus;</button>
      <button id="btn-zoom-in" class="vista-btn" title="zoom in">&plus;</button>
      <input type="text" id="buscar" placeholder="buscar...">
    </div>
    <div class="ventana-contenido" id="ventana-contenido"></div>
    <div class="sneak-peek" id="sneak-peek" style="display:none">
      <span class="sneak-peek-titulo" id="sneak-peek-titulo"></span>
      <span class="sneak-peek-fecha" id="sneak-peek-fecha"></span>
    </div>
  </div>

  <!-- modal contraseña para sanchai -->
  <div id="modal-pass" class="modal-pass hidden">
    <div class="modal-pass-box">
      <span class="modal-pass-titulo">🔒</span>
      <input type="password" id="modal-pass-input" placeholder="contraseña..." autocomplete="off">
      <button id="modal-pass-btn" class="vista-btn">entrar</button>
      <span id="modal-pass-error" class="modal-pass-error"></span>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
